name: Deploy Agent Skills (Devtest)

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: tfy apply (Devtest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TrueFoundry CLI
        run: pip install truefoundry

      - name: Apply manifest
        env:
          TFY_HOST: ${{ secrets.TFY_HOST_DEVTEST }}
          TFY_API_KEY: ${{ secrets.TFY_API_KEY_DEVTEST }}
        run: tfy apply -f manifest.yaml
